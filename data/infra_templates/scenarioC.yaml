# Google / Borg Spec

hostSpecification:
  hosts: 500                                  # physical hosts
  host_pes: 16                                # processing element (cores)
  host_mips: 1000                             # Million Instructions Per Second (MIPS). must also be per CORE (not for the CPU as a whole)
  host_ram: 2048                              # Megabytes (2GB)
  #32768 (32GB)
  host_bw: 10_000                             # Megabits/s (bandwidth) - network comms capacity (N/A for independent simulations?)
  host_storage: 1_000_000                     # Megabytes (1000GB, or 1TB)

vmSpecification:
  vms: 500
  vm_pes: 16
  vm_mips: 1000                               # this is per CORE, not per VM
  vm_ram: 2048
  vm_bw: 1000                                 # must be smaller than the host, doesn't impact execution time
  vm_storage: 10_000                          # 10GB

# note - some cloudlet configuration is independent of the abstracted app type
# the number of cloudlets will generally match the available hardware (for parallel processing)
cloudletSpecification:
  # WEB
  cloudlet_pes: 1 # a web request will generally be single-threaded (used to set this to 16, to max out all cores - not realistic)
  # NOT how many cores to use, rather how many are needed!
  cloudlet_length: 1_000                      # Million Instructions (MI)

# WEB or BATCH, determines which spec to pick up below
applicationType: WEB

webAppSpecification:
  arrival_interval: 10